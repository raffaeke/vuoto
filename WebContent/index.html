<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="30">
<title>Prova HTML</title>
<style>
    body {
      margin: 0;
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      font-family: Arial, sans-serif;
    }

    /* INTESTAZIONE CON LOGO E MENU */
    header {
      width: 100%;
      background: #000;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 50px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
      position: relative;
    }

    /* Logo al centro */
    header img {
      max-height: 120px;
      width: auto;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    /* Menu a sinistra e destra */
    header nav {
      display: flex;
      gap: 20px;
    }

    header nav a {
      color: white;
      text-decoration: none;
      font-weight: bold;
      font-size: 16px;
      transition: color 0.3s;
    }

    header nav a:hover {
      color: #2f8f3a;
    }

    /* CAMPO DA CALCIO */
    .field {
      position: relative;
      width: 1520px;
      height: 1080px;
      margin-top: 20px;
      background: repeating-linear-gradient(
        0deg,
        #2f8f3a,
        #2f8f3a 60px,
        #3fa34d 60px,
        #3fa34d 120px
      );
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      border-radius: 10px;
    }

    /* LINEA CENTRALE */
    .center-line {
      position: absolute;
      top: 50%;
      left: 0;
      width: 100%;
      height: 3px;
      background: white;
    }

    /* CERCHIO CENTRALE */
    .center-circle {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 200px;
      height: 200px;
      border: 3px solid white;
      border-radius: 50%;
      transform: translate(-50%, -50%);
    }

    /* AREA RIGORE */
    .penalty-box {
      position: absolute;
      width: 350px;
      height: 220px;
      border: 3px solid white;
      left: 50%;
      transform: translateX(-50%);
    }

    .penalty-box.top {
      top: 0;
    }

    .penalty-box.bottom {
      bottom: 0;
    }

    /* AREA PORTIERE */
    .goal-box {
      position: absolute;
      width: 200px;
      height: 100px;
      border: 3px solid white;
      left: 50%;
      transform: translateX(-50%);
    }

    .goal-box.top {
      top: 0;
    }

    .goal-box.bottom {
      bottom: 0;
    }

    /* DISCHETTI RIGORE */
    .penalty-spot {
      position: absolute;
      width: 10px;
      height: 10px;
      background: white;
      border-radius: 50%;
      left: 50%;
      transform: translateX(-50%);
    }

    .penalty-spot.top {
      top: 150px;
    }

    .penalty-spot.bottom {
      bottom: 150px;
    }
</style>
</head>
<body>
  <header>
    <!-- Menu a sinistra -->
    <nav class="nav-left">
      <a href="#maglie">Maglie</a>
      <a href="#completi">Completi</a>
    </nav>

    <!-- Logo centrale -->
    <img src="logo.png" alt="Kick Off Logo">

    <!-- Menu a destra -->
    <nav class="nav-right">
      <a href="#guantoni">Guantoni</a>
      <a href="#scarpette">Scarpette</a>
    </nav>
  </header>

  <div class="field">
    <div class="center-line"></div>
    <div class="center-circle"></div>

    <div class="penalty-box top"></div>
    <div class="goal-box top"></div>

    <div class="penalty-box bottom"></div>
    <div class="goal-box bottom"></div>

    <div class="penalty-spot top"></div>
    <div class="penalty-spot bottom"></div>
  </div>
</body>
</html>
